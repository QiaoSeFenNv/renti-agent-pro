# 生产部署 compose。在服务器上：docker compose -f docker-compose.prod.yml up -d
# Jenkins 拉取新镜像后：docker compose -f docker-compose.prod.yml up -d
name: renti

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: renti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: renti
      TZ: Asia/Shanghai
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - renti-network

  agent-service:
    image: ghcr.io/qiaosefennv/renti-agent-service:${IMAGE_TAG:-latest}
    container_name: renti-agent-service
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_CHAT_MODEL: ${DEEPSEEK_CHAT_MODEL:-deepseek-v4-pro}
      SPRING_BASE_URL: http://backend:8080
      RENTI_INTERNAL_TOKEN: ${RENTI_INTERNAL_TOKEN}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      TOOL_TIMEOUT_SECONDS: ${TOOL_TIMEOUT_SECONDS:-20}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - renti-network

  backend:
    image: ghcr.io/qiaosefennv/renti-agent-backend:${IMAGE_TAG:-latest}
    container_name: renti-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/renti
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # 覆盖 application.yml 中的开发期写死值
      RENTI_AGENT_BASE_URL: http://agent-service:8001
      RENTI_SECURITY_INTERNAL_TOKEN: ${RENTI_INTERNAL_TOKEN}
      RENTI_SECURITY_COOKIE_SECURE: "false"
      RENTI_AMAP_WEB_SERVICE_KEY: ${AMAP_WEB_SERVICE_KEY}
      RENTI_DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      RENTI_DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      RENTI_DEEPSEEK_CHAT_MODEL: ${DEEPSEEK_CHAT_MODEL:-deepseek-v4-pro}
      RENTI_QDRANT_URL: ${QDRANT_URL}
      RENTI_QDRANT_API_KEY: ${QDRANT_API_KEY}
      RENTI_QDRANT_COLLECTION: ${QDRANT_COLLECTION:-renti_listings_v2}
      RENTI_JINA_URL: ${JINA_URL:-https://api.jina.ai/v1/embeddings}
      RENTI_JINA_API_KEY: ${JINA_API_KEY}
      RENTI_JINA_MODEL: ${JINA_MODEL:-ina-embeddings-v3}
      RENTI_NEO4J_URI: ${NEO4J_URI}
      RENTI_NEO4J_USERNAME: ${NEO4J_USERNAME}
      RENTI_NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      RENTI_NEO4J_DATABASE: ${NEO4J_DATABASE}
      RENTI_NEO4J_PROXY_URL: ${NEO4J_PROXY_URL:-}
      RENTI_NEO4J_INSECURE_SKIP_VERIFY: ${NEO4J_INSECURE_SKIP_VERIFY:-true}
    depends_on:
      postgres:
        condition: service_healthy
      agent-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - renti-network

  front:
    image: ghcr.io/qiaosefennv/renti-agent-front:${IMAGE_TAG:-latest}
    container_name: renti-front
    restart: unless-stopped
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - renti-network

  nginx:
    image: nginx:alpine
    container_name: renti-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/html:/usr/share/nginx/html
    depends_on:
      - front
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - renti-network

networks:
  renti-network:
    driver: bridge
